<header class="site-header">
  <div class="wrap">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}"
           {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
